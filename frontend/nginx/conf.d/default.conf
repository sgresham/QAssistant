# HTTP Server - Redirects to HTTPS and handles ACME challenges
server {
    listen 8111;
    server_name qassistant.alacritycore.com;

    # Let's Encrypt challenge directory (Uncomment if you need HTTP challenge)
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 8112 ssl http2;
    server_name qassistant.alacritycore.com;

    # SSL Certificate Paths
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Type nosniff;

    # ==========================================
    # 1. Frontend (React App)
    # ==========================================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # 2. Backend API (REST)
    # ==========================================
    location /api/ {
        proxy_pass http://backend:3001/api/;
        
        # Standard Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache control
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================
    # 3. MCP SSE Endpoint (AI Agents)
    # ==========================================
    # This handles the initial connection establishment
    location /mcp {
        # Disable buffering to ensure real-time streaming
        proxy_buffering off;
        
        # Proxy Pass to Backend
        proxy_pass http://backend:3001/mcp;
        
        # Connection Upgrade Headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts: Crucial for SSE/AI Latency
        # Increase these if your AI agents take a long time to "think"
        proxy_read_timeout 300s; # 5 minutes
        proxy_send_timeout 300s;
    }

    # This handles the bidirectional message exchange after SSE is established
    # Note: The SSEServerTransport in Node.js usually posts back to /mcp/messages
    location /mcp/messages {
        proxy_buffering off;
        proxy_pass http://backend:3001/mcp/messages;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}