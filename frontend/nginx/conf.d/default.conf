# HTTP Server - Redirects to HTTPS and handles ACME challenges
server {
    listen 8111;
    server_name qassistant.alacritycore.com;

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 8112 ssl http2;
    server_name qassistant.alacritycore.com;

    # SSL Certificate Paths
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Type nosniff;

    # ==========================================
    # 1. Frontend (React App)
    # ==========================================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # 2. Backend API (REST)
    # ==========================================
    location /api/ {
        proxy_pass http://backend:3001/api/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        # Timeouts: Increase for long-running AI thoughts
        proxy_connect_timeout 300s;
        proxy_read_timeout 30000s;
        proxy_send_timeout 30000s;
        # Disable buffering to allow real-time data flow
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Ensure headers are sent immediately
        chunked_transfer_encoding on;
        tcp_nopush on;
        tcp_nodelay on;
    }

    # ==========================================
    # 3. MCP Streamable HTTP Endpoint
    # ==========================================
    location /mcp {
        # Standard Proxy Settings
        proxy_pass http://backend:3001/mcp;
        
        # Streamable HTTP uses standard HTTP, so we don't need SSE-specific headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts: Increase for long-running AI thoughts
        proxy_connect_timeout 300s;
        proxy_read_timeout 30000s;
        proxy_send_timeout 30000s;
        # Disable buffering to allow real-time data flow
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Ensure headers are sent immediately
        chunked_transfer_encoding on;
        tcp_nopush on;
        tcp_nodelay on;
    }

# ==========================================
    # 4. Google Workspace MCP Server
    # ==========================================
    location /google-mcp/ {
        proxy_pass http://10.10.10.30:8222/; # Keep the trailing slashes!
        
        # Streamable HTTP uses standard HTTP, so we don't need SSE-specific headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts: Increase for long-running AI thoughts
        proxy_connect_timeout 300s;
        proxy_read_timeout 30000s;
        proxy_send_timeout 30000s;
        # Disable buffering to allow real-time data flow
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Ensure headers are sent immediately
        chunked_transfer_encoding on;
        tcp_nopush on;
        tcp_nodelay on;
    }
}