# HTTP Server - Redirects to HTTPS and handles ACME challenges
server {
    listen 8111;
    server_name qassistant.alacritycore.com; # REPLACE WITH YOUR DOMAIN

    # Let's Encrypt challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 8112 ssl http2;
    server_name qassistant.alacritycore.com; # REPLACE WITH YOUR DOMAIN

    # SSL Certificate Paths
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Frontend (React App)
    # Vite builds static files to /usr/share/nginx/html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html; # Important for React Router history mode
    }

    # Backend API
    location /api/ {
        # Proxy to the backend container port 3001
        proxy_pass http://backend:3001/api/;
        
        # Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache control for API responses
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: If your frontend makes API calls to relative paths (e.g., /api), 
    # ensure the backend prefix is handled correctly.
}