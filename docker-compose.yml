services:
  # --- Frontend Service ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8111:8111"
      - "8112:8112"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/data/certs:/etc/letsencrypt # Persist Let's Encrypt certs
      - ./nginx/data/www:/var/www/certbot   # For ACME challenges

  # --- Backend Service ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI} # Use .env file for secrets
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001
    volumes:
      - ./backend/src:/app/src # Optional: for development hot reloading if needed, but usually not in prod
    depends_on:
      - frontend

