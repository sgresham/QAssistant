services:
  # --- Frontend Service (Nginx + React) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8111:80"
      - "8112:443"
    volumes:
      # Mount SSL certs from host
      - /etc/letsencrypt/live/qassistant.alacritycore.com:/etc/nginx/certs:ro
      # If you have a custom nginx config file locally, uncomment below:
      # - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    environment:
      - NGINX_PORT=80
      - NGINX_SSL_PORT=443

  # --- Backend Service ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - frontend

  # --- Certbot Service (Renewal only) ---
  # We keep this for renewal, but it doesn't serve traffic.
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./nginx/data/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    depends_on:
      - frontend

volumes:
  nginx_certs:
  nginx_www: